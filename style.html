<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-top: #f2f8ff;
    --bg-bottom: #dfeef1;
    --glass: rgba(255, 255, 255, 0.58);
    --glass-line: rgba(255, 255, 255, 0.68);
    --text: #102235;
    --muted: #5f6f82;
    --primary: #0f766e;
    --danger: #dc2626;
    --warning: #d97706;
    --ok: #15803d;
    --shadow-lg: 0 24px 80px rgba(16, 34, 53, 0.16);
    --shadow-md: 0 16px 40px rgba(16, 34, 53, 0.12);
    --shadow-sm: 0 8px 20px rgba(16, 34, 53, 0.08);
    --radius-xl: 30px;
    --hero-sticky-offset: 108px;
  }
  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 15% 20%, rgba(154, 208, 255, 0.75), transparent 32%),
      radial-gradient(circle at 85% 15%, rgba(160, 227, 203, 0.8), transparent 30%),
      radial-gradient(circle at 75% 78%, rgba(255, 233, 192, 0.65), transparent 26%),
      linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    background-attachment: fixed;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(120deg, rgba(255,255,255,0.22), transparent 25%, transparent 75%, rgba(255,255,255,0.14)),
      radial-gradient(circle at top, rgba(255,255,255,0.25), transparent 50%);
    pointer-events: none;
  }
  .ambient { position: fixed; border-radius: 999px; filter: blur(34px); opacity: 0.42; pointer-events: none; animation: drift 18s ease-in-out infinite; }
  .ambient-a { width: 240px; height: 240px; background: rgba(128,196,255,0.45); top: 12%; left: -40px; }
  .ambient-b { width: 260px; height: 260px; background: rgba(123,227,193,0.32); right: -70px; top: 24%; animation-delay: -6s; }
  .ambient-c { width: 220px; height: 220px; background: rgba(255,213,142,0.25); bottom: 8%; left: 20%; animation-delay: -12s; }
  @keyframes drift { 0%,100% { transform: translate3d(0,0,0) scale(1); } 50% { transform: translate3d(16px,-22px,0) scale(1.05); } }

  .overlay, .success-overlay, .confirm-overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px;
    background: rgba(10,20,35,0); backdrop-filter: blur(0); opacity: 0; pointer-events: none; transition: .35s ease; z-index: 50;
  }
  .overlay.active, .success-overlay.active, .confirm-overlay.active {
    background: rgba(10,20,35,0.28); backdrop-filter: blur(14px); opacity: 1; pointer-events: auto;
  }
  .glass-modal, .card, .map-card, .top-tabs, .hero-user-pill {
    background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.52));
    border: 1px solid var(--glass-line);
    box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.7);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
  }
  .glass-modal { width: min(100%, 420px); border-radius: 32px; padding: 28px; position: relative; overflow: hidden; text-align: center; }
  .glass-modal::before, .card::before, .map-card::before {
    content: ""; position: absolute; inset: 0; background: linear-gradient(130deg, rgba(255,255,255,0.34), transparent 38%, transparent 70%, rgba(255,255,255,0.18)); pointer-events: none;
  }
  .modal-badge, .hero-badge, .type-badge, .step-chip {
    display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 7px 12px;
    font-size: 12px; font-weight: 700; letter-spacing: .02em; background: rgba(255,255,255,0.56);
    border: 1px solid rgba(255,255,255,0.72); box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
  }
  .modal-badge { margin-bottom: 14px; color: var(--primary); }
  .modal-icon { font-size: 48px; margin-bottom: 12px; }
  .login-box h2, .success-box h3, .confirm-box h3 { font-size: 28px; line-height: 1.15; margin-bottom: 10px; }
  .subtitle { color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .credit { margin-top: 14px; font-size: 12px; color: var(--muted); }

  .input-group { text-align: left; margin-bottom: 16px; }
  .input-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .input-group input {
    width: 100%; border: 1px solid rgba(255,255,255,0.7); border-radius: 16px; padding: 15px 17px; color: var(--text); font-size: 16px;
    background: rgba(255,255,255,0.62); box-shadow: inset 0 1px 0 rgba(255,255,255,0.72); outline: none; transition: .24s ease;
  }
  .input-group input:focus { border-color: rgba(15,118,110,0.5); box-shadow: 0 0 0 4px rgba(15,118,110,0.12), inset 0 1px 0 rgba(255,255,255,0.82); transform: translateY(-1px); }

  .hero {
    position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 18px;
    width: min(1160px, calc(100% - 24px)); margin: 18px auto 0; padding: 18px 22px; border-radius: 28px;
    background: linear-gradient(160deg, rgba(17,94,89,0.68), rgba(30,64,175,0.44)); border: 1px solid rgba(255,255,255,0.24);
    box-shadow: 0 24px 60px rgba(15,37,64,0.18); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); color: #fff;
  }
  .hero-mark { width: 68px; height: 68px; display: flex; align-items: center; justify-content: center; border-radius: 22px; font-size: 34px; background: rgba(255,255,255,0.18); box-shadow: inset 0 1px 0 rgba(255,255,255,0.28); flex-shrink: 0; }
  .hero-copy { flex: 1; }
  .hero-badge { margin-bottom: 10px; color: #e5fffb; background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.16); }
  .hero h1 { font-size: clamp(1.9rem, 3vw, 2.45rem); line-height: 1.1; margin-bottom: 6px; }
  .hero p { color: rgba(255,255,255,0.88); max-width: 680px; line-height: 1.6; font-size: 15.5px; }
  .hero-user-pill { min-width: 180px; border-radius: 22px; padding: 14px 16px; background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.18); color: #fff; flex-shrink: 0; }
  .hero-user-name { font-weight: 800; font-size: 16px; margin-bottom: 4px; }
  .hero-user-id { font-size: 14px; color: rgba(255,255,255,0.82); }

  .container { width: min(1160px, calc(100% - 24px)); margin: 18px auto 0; padding: 8px 0 60px; }
  .page-section { margin-bottom: 18px; }
  .card { position: relative; border-radius: var(--radius-xl); padding: 24px; overflow: hidden; }
  .booking-shell { min-height: 460px; }
  .top-tabs {
    display: inline-flex;
    gap: 8px;
    padding: 8px;
    border-radius: 22px;
    margin-bottom: 16px;
    position: sticky;
    top: var(--hero-sticky-offset);
    z-index: 18;
    box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .tab-btn { min-width: 120px; border: 0; border-radius: 16px; padding: 13px 20px; cursor: pointer; font-weight: 800; font-size: 15px; color: var(--muted); background: transparent; transition: .24s ease; }
  .tab-btn.active { background: linear-gradient(135deg, rgba(15,118,110,0.95), rgba(30,64,175,0.92)); color: #fff; box-shadow: var(--shadow-sm); }
  .tab-btn:not(.active):hover { background: rgba(255,255,255,0.45); color: var(--text); }

  .step-indicator { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
  .step-dot { width: 38px; height: 38px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--muted); background: rgba(255,255,255,0.52); border: 1px solid rgba(255,255,255,0.7); box-shadow: inset 0 1px 0 rgba(255,255,255,0.68); }
  .step-dot.active { color: #fff; background: linear-gradient(135deg, rgba(15,118,110,0.96), rgba(30,64,175,0.92)); }
  .step-dot.done { color: var(--ok); background: rgba(220,252,231,0.88); }
  .step-line { width: 70px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.6); overflow: hidden; }
  .step-line::before { content: ""; display: block; width: 0; height: 100%; background: linear-gradient(90deg, rgba(15,118,110,0.94), rgba(30,64,175,0.9)); transition: width .26s ease; }
  .step-line.done::before { width: 100%; }

  .section-header { margin-bottom: 18px; }
  .section-header.compact { margin-bottom: 14px; }
  .section-title { font-size: 25px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; color: var(--text); }
  .section-title.no-line { margin-bottom: 4px; }
  .section-copy { color: var(--muted); line-height: 1.7; font-size: 15.5px; }

  .type-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
  .type-card {
    position: relative; border: 1px solid rgba(255,255,255,0.78); border-radius: 24px; padding: 18px; text-align: left; cursor: pointer;
    background: linear-gradient(160deg, rgba(255,255,255,0.72), rgba(255,255,255,0.42)), linear-gradient(120deg, color-mix(in srgb, var(--card-accent) 12%, white), transparent);
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.76); transition: .25s ease; overflow: hidden;
  }
  .type-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(130deg, rgba(255,255,255,0.35), transparent 35%, transparent 70%, rgba(255,255,255,0.12)); pointer-events: none; }
  .type-card:hover, .type-card.selected { transform: translateY(-3px); border-color: rgba(255,255,255,0.96); box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.86); }
  .type-card.selected { outline: 2px solid color-mix(in srgb, var(--card-accent) 65%, white); }
  .type-card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .type-emoji { font-size: 30px; }
  .type-badge { color: color-mix(in srgb, var(--card-accent) 70%, #102235); }
  .type-label { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .type-meta, .type-preview { color: var(--muted); line-height: 1.55; }
  .type-meta { margin-bottom: 6px; font-weight: 700; font-size: 15px; }
  .type-preview { font-size: 14px; }

  .step-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .step-chip { color: color-mix(in srgb, var(--chip-accent, var(--primary)) 74%, #102235); }
  .room-stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .stat-pill { min-width: 140px; border-radius: 18px; padding: 12px 14px; background: rgba(255,255,255,0.54); border: 1px solid rgba(255,255,255,0.7); box-shadow: inset 0 1px 0 rgba(255,255,255,0.74); }
  .stat-pill span { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .stat-pill strong { font-size: 18px; }

  .rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .room-card { position: relative; text-align: left; border: 1px solid rgba(255,255,255,0.78); border-radius: 22px; padding: 18px; background: rgba(255,255,255,0.62); box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.72); cursor: pointer; transition: .24s ease; }
  .room-card:hover:not(.disabled), .room-card.selected { transform: translateY(-3px); box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.82); }
  .room-card.selected { outline: 2px solid rgba(15,118,110,0.36); }
  .room-card.disabled { cursor: not-allowed; opacity: .62; }
  .room-top { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
  .room-title-wrap { display: flex; gap: 12px; min-width: 0; }
  .room-emoji { font-size: 30px; flex-shrink: 0; }
  .room-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .room-meta { color: var(--muted); font-size: 14px; }
  .room-top-side { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex-shrink: 0; }
  .badge { display: inline-flex; align-items: center; justify-content: center; padding: 7px 11px; border-radius: 999px; font-size: 13px; font-weight: 800; }
  .badge.available { color: var(--ok); background: rgba(220,252,231,0.92); }
  .badge.almost { color: var(--warning); background: rgba(254,243,199,0.95); }
  .badge.full { color: var(--danger); background: rgba(254,226,226,0.95); }
  .pick-mark { width: 28px; height: 28px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: #fff; background: linear-gradient(135deg, rgba(15,118,110,0.96), rgba(30,64,175,0.92)); box-shadow: var(--shadow-sm); }
  .progress-bar { width: 100%; height: 10px; border-radius: 999px; background: rgba(255,255,255,0.65); overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, rgba(15,118,110,0.96), rgba(30,64,175,0.9)); }
  .progress-text { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 13px; }

  .summary-card, .booking-card {
    position: relative;
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.56);
    border: 1px solid rgba(255,255,255,0.72);
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.74);
  }
  .summary-top, .booking-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .summary-emoji, .booking-icon { width: 58px; height: 58px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; background: rgba(255,255,255,0.56); }
  .summary-room, .booking-room { font-size: 27px; font-weight: 800; line-height: 1.15; }
  .summary-type, .booking-type { margin-top: 4px; color: var(--muted); font-size: 15px; }
  .summary-grid, .booking-meta { display: grid; gap: 10px; }
  .summary-row, .booking-meta div { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border-radius: 16px; background: rgba(255,255,255,0.46); }
  .summary-label { color: var(--muted); font-size: 13px; font-weight: 700; }
  .summary-value { font-weight: 700; font-size: 17px; }

  .user-card { display: flex; align-items: center; gap: 14px; padding: 18px; border-radius: 24px; margin-bottom: 18px; background: linear-gradient(135deg, rgba(15,118,110,0.88), rgba(30,64,175,0.82)); color: #fff; box-shadow: 0 18px 40px rgba(15,37,64,0.18); }
  .user-avatar { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: rgba(255,255,255,0.18); }
  .user-name { font-size: 21px; font-weight: 800; margin-bottom: 4px; }
  .user-id { color: rgba(255,255,255,0.84); font-size: 14px; }

  .info-card .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .info-item { padding: 16px 18px; border-radius: 18px; background: rgba(255,255,255,0.5); color: var(--text); line-height: 1.7; font-size: 15px; }
  .capacity-strip { display: flex; flex-wrap: wrap; gap: 10px; }
  .capacity-pill { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 999px; background: color-mix(in srgb, var(--pill-accent) 12%, rgba(255,255,255,0.78)); border: 1px solid rgba(255,255,255,0.72); color: color-mix(in srgb, var(--pill-accent) 72%, #102235); font-size: 13px; }
  .capacity-pill strong { font-size: 12px; }

  .map-card { position: relative; border-radius: 30px; overflow: hidden; }
  .map-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.64); }
  .map-wrap { padding: 22px; }
  .map-img { display: block; width: 100%; border-radius: 24px; background: rgba(255,255,255,0.74); border: 1px solid rgba(255,255,255,0.72); box-shadow: var(--shadow-md); }
  .map-empty { text-align: center; padding: 50px 20px; border-radius: 24px; color: var(--muted); background: rgba(255,255,255,0.48); border: 1px dashed rgba(255,255,255,0.86); }
  .map-sub { margin-top: 10px; font-size: 12px; }

  .alert { display: none; padding: 12px 14px; border-radius: 16px; margin-top: 4px; margin-bottom: 14px; font-weight: 700; line-height: 1.5; }
  .alert.error { display: block; background: rgba(254,226,226,0.92); color: var(--danger); }
  .alert.success { display: block; background: rgba(220,252,231,0.92); color: var(--ok); }

  .btn, .btn-back { border: 0; cursor: pointer; transition: .24s ease; font-weight: 800; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; min-height: 54px; padding: 14px 18px; border-radius: 18px; box-shadow: var(--shadow-sm); font-size: 16px; }
  .btn-primary { color: #fff; background: linear-gradient(135deg, rgba(15,118,110,0.96), rgba(30,64,175,0.92)); }
  .btn-secondary, .btn-back { color: var(--text); background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.74); }
  .btn-danger { color: #fff; background: linear-gradient(135deg, #ef4444, #dc2626); }
  .btn-outline { color: var(--danger); background: rgba(255,255,255,0.58); border: 1px solid rgba(220,38,38,0.18); }
  .btn-back { width: auto; min-height: 42px; padding: 10px 14px; border-radius: 14px; }
  .btn:hover:not(:disabled), .btn-back:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .btn:disabled, .btn-back:disabled { cursor: not-allowed; opacity: .7; transform: none; }
  .confirm-actions { display: flex; gap: 12px; }
  #confirmBtn, #cancelBtn { margin-top: 8px; }

  .success-room { font-size: 18px; margin-bottom: 10px; }
  .success-note { color: var(--muted); margin-bottom: 16px; }
  .success-progress { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.7); overflow: hidden; }
  #autoCloseProgress { width: 100%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, rgba(15,118,110,0.96), rgba(30,64,175,0.92)); }

  .floating-alert {
    position: fixed; right: 18px; bottom: 18px; z-index: 60; max-width: min(92vw, 360px); padding: 14px 16px; border-radius: 18px;
    box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.78); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    transform: translateY(20px); opacity: 0; pointer-events: none; transition: .25s ease; color: var(--text);
  }
  .floating-alert.show { opacity: 1; transform: translateY(0); }
  .floating-alert.success { background: rgba(220,252,231,0.9); }
  .floating-alert.error { background: rgba(254,226,226,0.92); }

  .skeleton { min-height: 160px; border-radius: 24px; background: linear-gradient(90deg, rgba(255,255,255,0.42), rgba(255,255,255,0.78), rgba(255,255,255,0.42)); background-size: 200% 100%; animation: shimmer 1.25s linear infinite; border: 1px solid rgba(255,255,255,0.72); }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .spinner { width: 16px; height: 16px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; animation: spin .65s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  *:focus-visible { outline: 3px solid rgba(15,118,110,0.36); outline-offset: 2px; }

  @media (max-width: 960px) {
    :root { --hero-sticky-offset: 160px; }
    .hero { flex-direction: column; align-items: flex-start; }
    .hero-user-pill { min-width: 0; width: 100%; }
    .summary-row, .booking-meta div { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 720px) {
    :root { --hero-sticky-offset: 176px; }
    .hero, .container { width: calc(100% - 16px); }
    .hero { margin-top: 8px; padding: 16px; border-radius: 24px; }
    .card, .glass-modal, .map-card { border-radius: 24px; }
    .card { padding: 20px; }
    .step-indicator { gap: 8px; }
    .step-line { width: 42px; }
    .confirm-actions { flex-direction: column; }
  }
  @media (max-width: 540px) {
    :root { --hero-sticky-offset: 188px; }
    .hero-mark { width: 58px; height: 58px; font-size: 28px; }
    .hero h1 { font-size: 1.7rem; }
    .hero p { font-size: 15px; }
    .section-title { font-size: 21px; }
    .section-copy { font-size: 15px; }
    .top-tabs { display: flex; width: 100%; }
    .tab-btn { flex: 1; min-width: 0; font-size: 15px; padding: 13px 16px; }
    .type-selector, .rooms-grid, .info-card .info-grid { grid-template-columns: 1fr; }
    .step-toolbar, .map-head { flex-direction: column; align-items: stretch; }
    .room-top { flex-direction: column; }
    .room-top-side { align-items: flex-start; flex-direction: row; }
    .type-card { padding: 20px; }
    .type-label { font-size: 21px; }
    .type-meta, .type-preview, .room-meta, .progress-text, .summary-label, .info-item { font-size: 14px; }
    .room-title { font-size: 19px; }
    .summary-room, .booking-room { font-size: 24px; }
    .summary-type, .booking-type, .summary-value, .hero-user-id { font-size: 15px; }
    .btn { min-height: 52px; font-size: 15px; }
    .stat-pill strong { font-size: 17px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
  }
</style>
